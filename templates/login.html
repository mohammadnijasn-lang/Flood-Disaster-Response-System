<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Kerala SDMA Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
135deg,
#07111f,
#10213f,
#17345c
);

overflow:hidden;
}

.card{

width:420px;

padding:40px;

border-radius:25px;

background:
rgba(255,255,255,.05);

backdrop-filter:blur(18px);

border:
1px solid rgba(255,255,255,.1);

box-shadow:
0 0 40px rgba(0,229,255,.15);

}

.logo{

text-align:center;
color:#00e5ff;
margin-bottom:10px;

}

.subtitle{

text-align:center;
color:#a9c6ff;
margin-bottom:30px;

}

input{

width:100%;

padding:14px;

background:#0f1d35;

border:1px solid #2d5ea8;

color:white;

border-radius:12px;

margin-top:12px;

}

button{

width:100%;

padding:14px;

margin-top:20px;

border:none;

border-radius:12px;

background:
linear-gradient(
90deg,
#00e5ff,
#00b8ff
);

font-weight:bold;

cursor:pointer;

}

button:hover{

transform:scale(1.02);

}

</style>

</head>

<body>

<div class="card">

<h1 class="logo">
🚨 Kerala SDMA
</h1>

<p class="subtitle">
Disaster Response System
</p>

<form action="/admin_login" method="post">

<input
name="username"
placeholder="Username"
required

>

<input
type="password"
name="password"
placeholder="Password"
required

>

<button>
Login
</button>

</form>

</div>

</body>
</html>
