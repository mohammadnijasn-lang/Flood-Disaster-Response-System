<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Kerala Disaster Control Room</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

background:linear-gradient(
135deg,
#07111f,
#10213f,
#17345c
);

padding:25px;

color:white;

}

h1{

text-align:center;

margin-bottom:25px;

color:#00e5ff;

}

.dashboard{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

margin-bottom:25px;

}

.card{

background:rgba(255,255,255,.05);

border-radius:20px;

padding:20px;

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(12px);

}

.card h2{

color:#00e5ff;

margin-bottom:15px;

}

.resource{

font-size:42px;

font-weight:bold;

text-align:center;

}

table{

width:100%;

border-collapse:collapse;

margin-top:10px;

}

th{

background:#10294f;

color:#00e5ff;

padding:12px;

}

td{

padding:12px;

border-bottom:1px solid #284a74;

text-align:center;

}

.green{

color:#00ff99;

font-weight:bold;

}

.yellow{

color:#ffd54f;

font-weight:bold;

}

.orange{

color:#ff9800;

font-weight:bold;

}

.red{

color:#ff5252;

font-weight:bold;

}

.status{

padding:5px 12px;

border-radius:8px;

background:#193252;

display:inline-block;

}

.footer{

margin-top:30px;

text-align:center;

color:#9eb6d8;

}

</style>

</head>

<body>

<h1>

🚨 Kerala Disaster Management Control Room

</h1>

<div class="dashboard">

<div class="card">

<h2>🚤 Boats</h2>

<div class="resource" id="boats">0</div>

</div>

<div class="card">

<h2>🚑 Ambulances</h2>

<div class="resource" id="ambulances">0</div>

</div>

<div class="card">

<h2>👷 Rescue Workers</h2>

<div class="resource" id="rescue_workers">0</div>

</div>

</div>


<div class="card">

<h2>🌧 District Flood Status</h2>

<table id="districtTable">

<tr>

<th>District</th>

<th>Flood %</th>

<th>Rainfall</th>

<th>Alert</th>

</tr>

</table>

</div>


<br>


<div class="card">

<h2>🚑 Active Missions</h2>

<table id="missionTable">

<tr>

<th>District</th>

<th>Rescue Base</th>

<th>Boats</th>

<th>Ambulances</th>

<th>Rescue_Workers</th>

<th>Status</th>

</tr>

</table>

</div>


<div class="footer">

Kerala State Disaster Management Authority

</div>


<script>

function loadResources(){

fetch("/live_resources")

.then(r=>r.json())

.then(data=>{

document.getElementById("boats").innerHTML=data.boats;

document.getElementById("ambulances").innerHTML=data.ambulances;

document.getElementById("rescue_workers").innerHTML=data.rescue_workers;

})

}


function loadDistricts(){

fetch("/district_status")

.then(r=>r.json())

.then(data=>{

let table=document.getElementById("districtTable");

table.innerHTML=`

<tr>

<th>District</th>

<th>Flood %</th>

<th>Rainfall</th>

<th>Alert</th>

</tr>

`;

data.forEach(d=>{

let cls="green";

if(d.alert.includes("YELLOW")) cls="yellow";

if(d.alert.includes("ORANGE")) cls="orange";

if(d.alert.includes("RED")) cls="red";

table.innerHTML+=`

<tr>

<td>${d.district}</td>

<td>${d.flood_area}</td>

<td>${d.rainfall}</td>

<td><span class="status ${cls}">${d.alert}</span></td>

</tr>

`;

});

});

}



function loadMissions(){

fetch("/missions")

.then(r=>r.json())

.then(data=>{

let table=document.getElementById("missionTable");

table.innerHTML=`

<tr>

<th>District</th>

<th>Rescue Base</th>

<th>Boats</th>

<th>Ambulances</th>

<th>rescue_workers</th>

<th>Status</th>

</tr>

`;

data.forEach(m=>{

table.innerHTML+=`

<tr>

<td>${m.district}</td>

<td>${m.station["name"]}</td>

<td>${m.boats}</td>

<td>${m.ambulances}</td>

<td>${m.rescue_workers}</td>

<td>${m.status}</td>

</tr>

`;

});

});

}


loadResources();

loadDistricts();

loadMissions();


setInterval(function(){

loadResources();

loadDistricts();

loadMissions();

},5000);

</script>

</body>

</html>
