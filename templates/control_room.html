<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>
Kerala Disaster Control Room
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

background:
linear-gradient(
135deg,
#07111f,
#10213f,
#17345c
);

min-height:100vh;

color:white;

padding:25px;
}

h1{

text-align:center;

margin-bottom:25px;

color:#00e5ff;

}

.dashboard{

display:grid;

grid-template-columns:
1fr 1fr 1fr;

gap:20px;

margin-bottom:25px;

}

.card{

background:
rgba(
255,
255,
255,
0.05
);

backdrop-filter:
blur(12px);

border:
1px solid rgba(
255,
255,
255,
0.1
);

border-radius:20px;

padding:20px;

box-shadow:
0 8px 32px rgba(
0,
229,
255,
0.1
);

}

.card h2{

color:#00e5ff;

margin-bottom:10px;

}

.resource{

font-size:28px;

font-weight:bold;

text-align:center;

}

table{

width:100%;

border-collapse:collapse;

background:
rgba(
255,
255,
255,
0.05
);

border-radius:20px;

overflow:hidden;

}

th{

background:#0f1d35;

color:#00e5ff;

padding:14px;

}

td{

padding:14px;

border-bottom:
1px solid #20385d;

text-align:center;

}

.green{
color:#00ff7f;
font-weight:bold;
}

.yellow{
color:#ffd54f;
font-weight:bold;
}

.orange{
color:#ff9800;
font-weight:bold;
}

.red{
color:#ff5252;
font-weight:bold;
}

.statusBox{

padding:8px 14px;

border-radius:10px;

display:inline-block;

font-weight:bold;

}

.footer{

margin-top:25px;

text-align:center;

color:#9fb3d1;

}

</style>

</head>

<body>

<h1>
🚨 Kerala Disaster Management Control Room
</h1>

<div class="dashboard">

<div class="card">

<h2>
🚤 Boats
</h2>

<div
class="resource"
id="boats"
>
0
</div>

</div>

<div class="card">

<h2>
🚑 Ambulances
</h2>

<div
class="resource"
id="ambulances"
>
0
</div>

</div>

<div class="card">

<h2>
👷 Workers
</h2>

<div
class="resource"
id="workers"
>
0
</div>

</div>

</div>

<div class="card">

<h2>
🌧 District Flood Status
</h2>

<table id="table">

<tr>

<th>
District
</th>

<th>
Flood Area
</th>

<th>
Rainfall
</th>

<th>
Alert
</th>

</tr>

</table>

</div>

<div class="footer">

Kerala State Disaster Management Authority

</div>

<script>

function loadResources(){

fetch("/live_resources")

.then(r=>r.json())

.then(data=>{

document.getElementById(
"boats"
).innerHTML =
data.boats

document.getElementById(
"ambulances"
).innerHTML =
data.ambulances

document.getElementById(
"rescue_workers"
).innerHTML =
data.workers

})

}

function loadDistricts(){

fetch("/district_status")

.then(r=>r.json())

.then(data=>{

let table =
document.getElementById(
"table"
)

table.innerHTML = `

<tr>

<th>District</th>

<th>Flood Area</th>

<th>Rainfall</th>

<th>Alert</th>

</tr>

`

data.forEach(d=>{

let colorClass="green"

if(
d.alert.includes("YELLOW")
){
colorClass="yellow"
}

if(
d.alert.includes("ORANGE")
){
colorClass="orange"
}

if(
d.alert.includes("RED")
){
colorClass="red"
}

table.innerHTML += `

<tr>

<td>
${d.district}
</td>

<td>
${d.flood_area} %
</td>

<td>
${d.rainfall}
mm
</td>

<td>

<span
class="
statusBox
${colorClass}
">

${d.alert}

</span>

</td>

</tr>

`

})

})

}

loadResources()
loadDistricts()

setInterval(
loadResources,
5000
)

setInterval(
loadDistricts,
10000
)

</script>

</body>

</html>
